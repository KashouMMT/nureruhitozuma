# Database Configuration (MYSQL)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT:3306}/${MYSQL_DATABASE:en_bangkok}?createDatabaseIfNotExist=true&sslMode=REQUIRED&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8&sessionVariables=sql_mode=%27STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION%27
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD}

# Database Configuration (Mongo DB)
spring.data.mongodb.uri=mongodb://${MONGODB_USER:root}:${MONGODB_PASSWORD}@${MONGODB_HOST}:${MONGODB_PORT:27017}/${MONGO_DB:en_bangkok}?authSource=admin

# Database Redis Configuration (Redis)
spring.data.redis.host=${REDISHOST}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD}
spring.data.redis.timeout=2000
spring.session.redis.flush-mode=on-save
spring.session.redis.namespace=en_bangkok:sessions
spring.cache.type=redis

# Enable Redisson Hibernate L2 & cache query
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.redisson.hibernate.RedissonRegionFactory
spring.jpa.properties.hibernate.cache.redisson.config=redisson.yaml

# Session Management
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
spring.session.timeout=30m

# Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=BOOLEAN

# File Storage and Upload Settings
app.storage.path=${APP_STORAGE_PATH:./uploads}
app.files.public-prefix=/files/

# Multipart File Limit
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB
server.tomcat.max-part-count=100

# Web MVC / Static Resources
spring.mvc.static-path-pattern=/static/**
spring.web.resources.static-locations=classpath:/static/

# Template Engines (Thymeleaf + JSP fallback)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Security / Remember Me
# Secret key for persistent tokens (I believe this value is stored in app_secrtes in db)
security.rememberme.key=

# Token validity: 14 days (in seconds)
security.rememberme.token-validity=${REMEMBER_ME_TTL:1209600}

# No persist servlet sessions to disk 
server.servlet.session.persistent=false

# Encoding
spring.messages.encoding=UTF-8
spring.messages.basename=messages

# Actuator Configuration
management.endpoints.web.exposure.include=*

# Logging Configuration
logging.level.root=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=${LOG_LEVEL:INFO}
logging.level.org.hibernate=${LOG_LEVEL:INFO}
logging.level.com.dev.main=${LOG_LEVEL:INFO}
logging.file.name=logs/app.log