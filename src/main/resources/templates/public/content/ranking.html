<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="public-ranking">
	<div id="wrapper" class="clear subpage-wrapper">
		<div class="fxnav" data-nav-shell="">
			<nav data-nav="">
				<ul class="topnav clear">
					<li><a th:href="@{/{lang}/home(lang=${#locale.language})}">トップページ</a></li>
					<li><a th:href="@{/{lang}/home/schedule(lang=${#locale.language})}">本日の出勤</a></li>
					<li><a th:href="@{/{lang}/home/cast(lang=${#locale.language})}">キャスト一覧</a></li>
					<li><a th:href="@{/{lang}/home/system(lang=${#locale.language})}">料金システム</a></li>
					<li><a class="active" th:href="@{/{lang}/home/ranking(lang=${#locale.language})}">ランキング</a></li>
					<li><a th:href="@{/{lang}/home/newcomer(lang=${#locale.language})}">新人一覧</a></li>
				</ul>
			</nav>
		</div>
		<div id="contents" data-page-root="">
			<div id="breadcrumbs">
				<ol>
					<li>
						<a th:href="@{/{lang}/home(lang=${#locale.language})}">
							<span data-shop-name="">濡れる人妻</span>
						</a>
					</li>
					<li><span>ランキング</span></li>
				</ol>
			</div>

			<div id="ranking">
				<h2>Ranking</h2>
				<div class="section">
					<h3>本指名ランキング</h3>
					<ul class="rklists clear">
						<li th:each="product, idx : ${products}">
							<div class="rkstaff">
								<p class="rkicon">
									<span th:text="|No. ${idx.count}|"></span>
								</p>
								<div class="inner">
									<div class="photo">
										<div class="snsicon"></div>
										<div class="boxicon">
											<p class="newicon"></p>
											<p class="rankicon"></p>
										</div>
										<!-- 
										<p class="ccicon">
											<img th:src="@{/public/assets/images/class00.png}"alt="" />
										</p>
										 -->
										<a href="staffdetail.html?id=20"
											><img
												th:src="@{/files/{image}(image=${product.getMainProductImage})}"
												class="staffimg"
												alt="みゆき"
										/></a>
									</div>

									<div class="prof">
										<h3 th:text="${product.title}"></h3>
										<!-- 
										<p class="size"></p>
										 -->
										<div th:text="${product.shortDescription}" class="tdcom"></div>
									</div>
								</div>
							</div>
						</li>

					</ul>
				</div>
			</div>
		</div>
	</div>
</th:block>
