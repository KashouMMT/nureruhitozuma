<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<th:block th:if="${metaDescription != null}">
	<meta name="description" th:attr="content=${metaDescription}">
</th:block>
<th:block th:unless="${metaDescription != null}">
	<meta name="description" th:attr="content=#{meta.description}">
</th:block>
<th:block th:if="${metaTitle != null}">
	<title th:text="${metaTitle}"></title>
</th:block>
<th:block th:unless="${metaTitle != null}">
	<title th:text="#{meta.title}"></title>
</th:block>
<!-- Bootstrap -->
<link rel="stylesheet" type="text/css" th:href="@{/public/bootstrap-5.3.7-dist/css/bootstrap.css}">
<link rel="stylesheet" type="text/css" th:href="@{/public/css/style.css}">

<!-- Bootstrap Icons-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body style="background: url('/public/assets/images/bg_1.jpg') center / cover no-repeat;">
	<main class="container">
		<div
			class="d-flex flex-column justify-content-center align-items-center"
			style="min-height: 50vh;">
			<div th:if="${success}" class="alert alert-success" role="alert"
				th:text="#{${success}}"></div>
			<div th:if="${warn}" class="alert alert-warning" role="alert"
				th:text="#{${warn}}"></div>
			<form th:action="@{/auth/sign-in}" method="post"
				class="w-100 px-4 py-3 border rounded shadow needs-validation"
				novalidate style="max-width: 500px; background: black; color: white;">
				<div
					class="d-flex flex-column justify-content-center align-items-center">
					<a th:href="@{/{lang}/home(lang=${#locale.language})}"
						class="text-decoration-none"><span th:text="#{site.title}"
						class="fs-1 text-decoration-none mt-3 mb-4"></span></a>
					<h3 th:text="#{login.title}"></h3>
				</div>

				<div th:text="#{login.error}" th:if="${param.error}"
					class="alert alert-danger py-2 mb-3"></div>

				<div class="form-group">
					<label th:text="#{login.username}" for="username"></label> <input
						type="text" autocomplete="username" class="form-control"
						id="username" name="username" required
						th:placeholder="#{login.username}">
					<div th:text="#{login.username-error}" class="invalid-feedback"></div>
				</div>

				<div class="form-group mt-3">
					<label th:text="#{login.password}" for="password"></label> <input
						type="password" class="form-control" id="password" name="password"
						required minlength="6" autocomplete="current-password">
					<div th:text="#{login.password-error}" class="invalid-feedback"></div>
				</div>

				<div class="form-check mt-3">
					<input type="checkbox" class="form-check-input" id="remember-me"
						name="remember-me"> <label th:text="#{login.remember-me}"
						class="form-check-label" for="remember-me"></label>
				</div>

				<button th:text="#{login.title}" type="submit"
					class="btn btn-primary mt-3 w-100"></button>

				<div class="mt-3">
					<a th:text="#{login.register-account}"
						th:href="@{/{lang}/auth/sign-up(lang=${#locale.language})}"
						style="color: rgb(128, 255, 255);"></a><br>
					<!-- 
					<a th:href="@{/auth/forgot-password}"
						style="color: blue;">Forgot Password?</a>
					 -->
				</div>
				<input type="hidden" th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}" /> <input type="hidden" name="lang"
					th:value="${#locale.language}" />
				<div th:if="${info}"
					class="alert alert-info small ps-2 pe-2 mt-2 fw-bold"
					style="text-align: justify;" role="alert" th:text="#{${info}}"></div>
			</form>
		</div>
	</main>
	<footer> </footer>
	<!-- Bootstrap -->
	<script th:src="@{/public/bootstrap-5.3.7-dist/js/bootstrap.js}"></script>
	<script th:src="@{/public/js/script.js}"></script>
	<script>
		(() => {
		  'use strict';
		  const form = document.querySelector('.needs-validation');
		  form.addEventListener('submit', e => {
		    if (!form.checkValidity()) {
		      e.preventDefault(); e.stopPropagation();
		    }
		    form.classList.add('was-validated');
		  });
		})();
	</script>
</body>
</html>
