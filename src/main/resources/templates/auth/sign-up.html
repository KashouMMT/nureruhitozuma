<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<th:block th:if="${metaDescription != null}">
	<meta name="description" th:attr="content=${metaDescription}">
</th:block>
<th:block th:unless="${metaDescription != null}">
	<meta name="description" th:attr="content=#{meta.description}">
</th:block>
<th:block th:if="${metaTitle != null}">
	<title th:text="${metaTitle}"></title>
</th:block>
<th:block th:unless="${metaTitle != null}">
	<title th:text="#{meta.title}"></title>
</th:block>
<!-- Bootstrap -->
<link rel="stylesheet" type="text/css"
	th:href="@{/public/bootstrap-5.3.7-dist/css/bootstrap.css}">
<link rel="stylesheet" type="text/css"
	th:href="@{/public/css/style.css}">

<!-- Bootstrap Icons-->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body style="background: url('/public/assets/images/bg_1.jpg') center / cover no-repeat;">
	<main class="container">
		<div
			class="d-flex flex-column justify-content-center align-items-center"
			style="min-height: 50vh;">
			<form th:action="@{/{lang}/auth/register(lang=${#locale.language})}"
				th:object="${userDto}" method="post"
				class="w-100 px-4 py-3 border rounded shadow"
				style="max-width: 500px; background: black; color:white;">
				<div
					class="d-flex flex-column justify-content-center align-items-center">
					<a th:href="@{/{lang}/home(lang=${#locale.language})}"
						class="text-decoration-none"> <span th:text="#{site.title}"
						class="fs-1 text-decoration-none mt-3 mb-4"></span>
					</a>
					<h3 class="mt-3 mb-4" th:text="#{login.create-account}"></h3>
				</div>
				<div th:if="${warn}" class="alert alert-warning" role="alert"
					th:text="${warn}"></div>

				<!-- 
				<div class="form-group">
					<label for="name">Name</label> <input th:field="*{name}" id="name"
						type="text" class="form-control"
						th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'">
					<div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
						th:errors="*{name}"></div>
				</div>
				 -->
				<div class="form-group mt-3">
					<label th:text="#{login.username}" for="email"></label> <input
						th:field="*{email}" id="email" type="text" class="form-control"
						th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'">
					<div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
						th:errors="*{email}"></div>
				</div>

				<div class="form-group mt-3">
					<label th:text="#{login.password}" for="password"></label> <input
						th:field="*{password}" id="password" type="password"
						class="form-control"
						th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'">
					<div class="invalid-feedback"
						th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
				</div>
				<button th:text="#{login.register}" type="submit"
					class="btn btn-primary mt-3 w-100"></button>
				<div class="mt-3">
					<a th:text="#{login.back-to-login}"
						th:href="@{/{lang}/auth/login(lang=${#locale.language})}"
						style="color: rgb(128, 255, 255)"></a><br>
					<!-- 
					<a th:href="@{/auth/forgot-password}" style="color: blue;">Forgot Password?</a>
					 -->
				</div>
			</form>
		</div>
	</main>
	<footer> </footer>
	<!-- Bootstrap -->
	<script th:src="@{/public/bootstrap-5.3.7-dist/js/bootstrap.js}"></script>
	<script th:src="@{/public/js/script.js}"></script>
</body>
</html>
