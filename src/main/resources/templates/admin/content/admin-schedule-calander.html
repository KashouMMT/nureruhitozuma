<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<th:block th:fragment="admin-schedule-calander">
	<main>
		<div class="container-fluid px-4">
			<h1 class="mt-4">Add Schedule</h1>
			<ol class="breadcrumb mb-4">
				<li class="breadcrumb-item"><a th:href="@{/{lang}/admin/dashboard(lang=${#locale.language})}">Dashboard</a></li>
				<li class="breadcrumb-item active">Schedule Calendar</li>
			</ol>
			<div class="card mb-4">
				<div class="card-body">
					<form method="POST" 
					th:action="@{/{lang}/admin/edit-schedule/{productId}(productId=${productId},lang=${#locale.language})}"
					onsubmit="return submitDates()">
					    <h1>Therapist Availability</h1>
					
					    <div class="calendar-wrapper">
					        <input type="text" id="availableDates">
					    </div>
					
					    <div class="selected-dates">
					        <h3>Selected Dates</h3>
					        <div id="dateList"></div>
					    </div>
					    
					    <!-- Hidden Input submitted to backend -->
					    <input type="hidden" name="selectedDates" id="selectedDatesInput" />
					
						<!-- Existing dates from backend -->
						<th:block th:if="${selectedDates} != null">
							<input type="hidden" id="existingDates" th:value="${selectedDates}"/>
						</th:block>
						
					    <button class="btn btn-primary mt-3 px-5 py-2 shadow-sm fw-semibold rounded-pill hover-glow" 
					    type="submit">
					        Submit Schedule
					    </button>
					</form>
				</div>
			</div>
		</div>
	</main>
</th:block>
</html>
