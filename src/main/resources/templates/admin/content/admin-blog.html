<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<th:block th:fragment="admin-table">
	<main>
		<div class="container-fluid px-4">
			<h1 class="mt-4" th:text="#{nav.blogs}"></h1>
			<ol class="breadcrumb mb-4">
				<li class="breadcrumb-item"><a
					th:href="@{/{lang}/admin/dashboard(lang=${#locale.language})}"
					th:text="#{nav.dashboard}"></a></li>
				<li class="breadcrumb-item active" th:text="#{nav.blogs}"></li>
			</ol>
			<div class="card mb-4">
				<div
					class="card-header d-flex justify-content-between align-items-center">
					<i class="fas fa-table me-1"></i> <span th:text="#{nav.blogs}"></span>
					<a
						class="btn btn-primary px-5 py-2 shadow-sm fw-semibold rounded-pill hover-glow ms-auto"
						th:href="@{/{lang}/admin/add-blog(lang=${#locale.language})}">
						<span th:text="#{admin.blog.add}"></span>
					</a>
				</div>
				<div class="card-body">
					<div th:if="${success}" class="alert alert-success" role="alert"
						th:text="${success}"></div>
					<div class="alert alert-info" role="alert">Click to edit blog</div>
					<div class="container-fluid">
						<div th:each="blog : ${blogs}" class="row mt-2 pt-3 pb-3 border">

							<a class="col-4"
								th:href="@{/{lang}/admin/edit-blog/{id}(id=${blog.id},lang=${#locale.language})}">
								<th:block th:if="${blog.imageName != null}">
									<img class="card-img object-fit-cover"
										th:src="@{'/files/' + ${blog.imageName}}" alt="Fancy Product">
								</th:block> <th:block th:unless="${blog.imageName != null}">
									<p th:text="#{admin.blog.image-not-attached}"></p>
								</th:block>
							</a>

							<div class="col-8">
								<div class="d-flex justify-content-between align-items-start">
									<span class="fw-bolder" th:text="'Title: ' + ${blog.title}"></span>

									<span class="d-flex flex-column text-end"> <a
										th:href="@{/{lang}/admin/delete-blog/{id}(id=${blog.id},lang=${#locale.language})}"
										class="btn btn-sm btn-danger position-relative z-3"
										onclick="event.stopPropagation(); return confirm('Delete?');">
											Delete </a> <span class="small text-muted"
										th:text="${'Created At: ' + #temporals.format(blog.createdAt, 'yyyy-mm-dd HH:mm')}"></span>
										<span class="small text-muted"
										th:text="${'Updated At: ' + #temporals.format(blog.updatedAt, 'yyyy-mm-dd HH:mm')}"></span>
									</span>

								</div>
								<div class="mt-3 text-start">
									<span th:utext="${blog.content}"></span>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
</th:block>
</html>
