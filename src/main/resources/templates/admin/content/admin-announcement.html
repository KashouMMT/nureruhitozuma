<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<th:block th:fragment="admin-table">
	<main>
		<div class="container-fluid px-4">
			<h1 class="mt-4" th:text="#{nav.announcement}"></h1>
			<ol class="breadcrumb mb-4">
				<li class="breadcrumb-item"><a
					th:href="@{/{lang}/admin/dashboard(lang=${#locale.language})}"
					th:text="#{nav.dashboard}"></a></li>
				<li class="breadcrumb-item active" th:text="#{nav.announcement}"></li>
			</ol>
			<div class="card mb-4">
				<div
					class="card-header d-flex justify-content-between align-items-center">
					<i class="fas fa-table me-1"></i> <span
						th:text="#{nav.announcement}"></span> <a
						class="btn btn-primary px-5 py-2 shadow-sm fw-semibold rounded-pill hover-glow ms-auto"
						th:href="@{/{lang}/admin/add-announcement(lang=${#locale.language})}">
						<span th:text="#{admin.announcement.add}"></span>
					</a>
				</div>
				<div class="card-body">
					<div th:if="${success}" class="alert alert-success" role="alert"
						th:text="${success}"></div>
					<div class="container-fluid">
						<div th:each="announcement : ${announcements}"
							class="row mt-2 pt-3 pb-3 border">

							<div class="col-12">
								<div class="d-flex justify-content-between align-items-start">
									<span class="fw-bolder"
										th:text="'Title: ' + ${announcement.title}"></span> <span
										class="d-flex flex-column text-end"> <a
										class="btn btn-sm btn-info position-relative z-3 text-white"
										th:href="@{/{lang}/admin/edit-announcement/{id}(id=${announcement.id},lang=${#locale.language})}">
											Edit Announcement </a> <a
										th:href="@{/{lang}/admin/delete-announcement/{id}(id=${announcement.id},lang=${#locale.language})}"
										class="btn btn-sm btn-danger position-relative z-3"
										onclick="event.stopPropagation(); return confirm('Delete?');">
											Delete </a> <span class="small text-muted"
										th:text="${'Created At: ' + #temporals.format(announcement.createdAt, 'yyyy-mm-dd HH:mm')}"></span>
										<span class="small text-muted"
										th:text="${'Updated At: ' + #temporals.format(announcement.updatedAt, 'yyyy-mm-dd HH:mm')}"></span>
									</span>

								</div>
								<div class="mt-3 text-start">
									<span th:text="${announcement.content}"></span>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
</th:block>
</html>
